<div class="login-page">
  <div class="login-card">
    <h2>Autentificare</h2>
    <p class="subtitle">Portal Studenti UPT</p>

    <form class="login-form" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="email">Email universitar</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="email@student.upt.ro"
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label for="password">Parola</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Introdu parola"
        />
      </div>

      <p class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</p>

      <button type="submit">Autentificare</button>
    </form>
  </div>
</div>
